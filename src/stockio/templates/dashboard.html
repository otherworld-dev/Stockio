<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockio Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e1e4eb;
            --text-dim: #8b8fa3;
            --green: #00c853;
            --red: #ff1744;
            --blue: #2979ff;
            --yellow: #ffd600;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        header h1 span { color: var(--blue); }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.running { background: rgba(0,200,83,0.15); color: var(--green); }
        .status-badge.stopped { background: rgba(255,23,68,0.15); color: var(--red); }
        .status-badge.paper { background: rgba(255,214,0,0.15); color: var(--yellow); }

        .btn {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-start { background: var(--green); color: #000; }
        .btn-stop { background: var(--red); color: #fff; }
        .btn-refresh { background: var(--border); color: var(--text); }

        .dashboard {
            padding: 1.5rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.2rem;
        }

        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.4rem;
        }

        .card-value {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .card-value.positive { color: var(--green); }
        .card-value.negative { color: var(--red); }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .panel-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 0.7rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        .side-buy { color: var(--green); font-weight: 600; }
        .side-sell { color: var(--red); font-weight: 600; }

        .signal-buy { background: rgba(0,200,83,0.15); color: var(--green); padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 600; font-size: 0.8rem; }
        .signal-sell { background: rgba(255,23,68,0.15); color: var(--red); padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 600; font-size: 0.8rem; }
        .signal-hold { background: rgba(139,143,163,0.15); color: var(--text-dim); padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: 600; font-size: 0.8rem; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .loading { color: var(--text-dim); padding: 2rem; text-align: center; }
        .error { color: var(--red); padding: 1rem; }

        .conf-bar {
            width: 60px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            display: inline-block;
            vertical-align: middle;
        }
        .conf-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--blue);
        }

        .last-updated {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .chart-container {
            padding: 1rem 1.2rem 1.2rem;
            position: relative;
            height: 280px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 1024px) {
            .grid-3 { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            .grid-3 { grid-template-columns: 1fr; }
            .dashboard { padding: 1rem; }
            header { padding: 0.8rem 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1><span>Stockio</span> Dashboard</h1>
        <div class="header-controls">
            <span class="status-badge paper" id="mode-badge">PAPER</span>
            <span class="status-badge stopped" id="bot-badge">STOPPED</span>
            <button class="btn btn-start" id="btn-start" onclick="startBot()">Start Bot</button>
            <button class="btn btn-stop" id="btn-stop" onclick="stopBot()" style="display:none">Stop Bot</button>
            <button class="btn btn-refresh" onclick="refreshAll()">Refresh</button>
        </div>
    </header>

    <div class="dashboard">
        <!-- Summary Cards -->
        <div class="cards">
            <div class="card">
                <div class="card-label">Total Value</div>
                <div class="card-value" id="total-value">--</div>
            </div>
            <div class="card">
                <div class="card-label">Cash</div>
                <div class="card-value" id="cash-value">--</div>
            </div>
            <div class="card">
                <div class="card-label">Holdings</div>
                <div class="card-value" id="holdings-value">--</div>
            </div>
            <div class="card">
                <div class="card-label">P&amp;L</div>
                <div class="card-value" id="pnl-value">--</div>
            </div>
            <div class="card">
                <div class="card-label">P&amp;L %</div>
                <div class="card-value" id="pnl-pct-value">--</div>
            </div>
            <div class="card">
                <div class="card-label">Positions</div>
                <div class="card-value" id="positions-count">--</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid-3">
            <div class="panel">
                <div class="panel-header"><h2>Portfolio Value</h2></div>
                <div class="chart-container">
                    <canvas id="chart-value"></canvas>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header"><h2>Profit &amp; Loss</h2></div>
                <div class="chart-container">
                    <canvas id="chart-pnl"></canvas>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header"><h2>Allocation</h2></div>
                <div class="chart-container">
                    <canvas id="chart-alloc"></canvas>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <!-- Holdings -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Holdings</h2>
                </div>
                <div id="holdings-table">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <!-- Signals -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Current Signals</h2>
                    <button class="btn btn-refresh" onclick="loadSignals()" style="font-size:0.75rem;padding:0.3rem 0.8rem;">Analyse</button>
                </div>
                <div id="signals-table">
                    <div class="loading">Click "Analyse" to generate signals</div>
                </div>
            </div>
        </div>

        <!-- Trade History -->
        <div class="panel">
            <div class="panel-header">
                <h2>Trade History</h2>
                <span class="last-updated" id="last-updated"></span>
            </div>
            <div id="trades-table">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // Auto-refresh interval (30 seconds)
        const REFRESH_MS = 30000;

        function fmt(n) { return '£' + n.toFixed(2); }
        function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }

        async function loadTrades() {
            try {
                const resp = await fetch('/api/trades?limit=30');
                const trades = await resp.json();

                if (trades.length === 0) {
                    document.getElementById('trades-table').innerHTML = '<div class="loading">No trades yet</div>';
                    return;
                }

                let html = '<table><thead><tr><th>Time</th><th>Side</th><th>Ticker</th><th>Shares</th><th>Price</th><th>Total</th><th>Reason</th></tr></thead><tbody>';
                trades.forEach(t => {
                    const cls = t.side === 'BUY' ? 'side-buy' : 'side-sell';
                    const time = t.timestamp.replace('T', ' ').slice(0, 19);
                    const reason = t.reason.length > 60 ? t.reason.slice(0, 60) + '...' : t.reason;
                    html += `<tr>
                        <td>${time}</td>
                        <td class="${cls}">${t.side}</td>
                        <td><strong>${t.ticker}</strong></td>
                        <td>${t.shares.toFixed(4)}</td>
                        <td>${fmt(t.price)}</td>
                        <td>${fmt(t.total)}</td>
                        <td style="color:var(--text-dim);font-size:0.8rem">${reason}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('trades-table').innerHTML = html;
            } catch (err) {
                console.error('Failed to load trades:', err);
            }
        }

        async function loadSignals() {
            document.getElementById('signals-table').innerHTML = '<div class="loading">Analysing market data...</div>';
            try {
                const resp = await fetch('/api/signals');
                const signals = await resp.json();

                if (signals.error) {
                    document.getElementById('signals-table').innerHTML = `<div class="error">${signals.error}</div>`;
                    return;
                }

                let html = '<table><thead><tr><th>Ticker</th><th>Signal</th><th>Confidence</th><th>Reasons</th></tr></thead><tbody>';
                signals.forEach(s => {
                    const cls = s.signal === 'BUY' ? 'signal-buy' : s.signal === 'SELL' ? 'signal-sell' : 'signal-hold';
                    const confWidth = Math.round(s.confidence * 100);
                    const reasons = s.reasons.slice(0, 2).join('; ');
                    html += `<tr>
                        <td><strong>${s.ticker}</strong></td>
                        <td><span class="${cls}">${s.signal}</span></td>
                        <td>
                            <span class="conf-bar"><span class="conf-bar-fill" style="width:${confWidth}%"></span></span>
                            ${(s.confidence * 100).toFixed(0)}%
                        </td>
                        <td style="color:var(--text-dim);font-size:0.8rem">${reasons}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('signals-table').innerHTML = html;
            } catch (err) {
                document.getElementById('signals-table').innerHTML = `<div class="error">Failed to load signals</div>`;
            }
        }

        async function startBot() {
            await fetch('/api/bot/start', { method: 'POST' });
            loadStatus();
        }

        async function stopBot() {
            await fetch('/api/bot/stop', { method: 'POST' });
            loadStatus();
        }

        function refreshAll() {
            loadStatus();
            loadTrades();
        }

        // ---------------- Charts ----------------
        const chartDefaults = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#8b8fa3', font: { size: 11 } } } },
            scales: {
                x: { ticks: { color: '#8b8fa3', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: 'rgba(42,45,58,0.6)' } },
                y: { ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { color: 'rgba(42,45,58,0.6)' } },
            },
        };

        let valueChart = null;
        let pnlChart = null;
        let allocChart = null;

        function initCharts() {
            const valueCtx = document.getElementById('chart-value').getContext('2d');
            valueChart = new Chart(valueCtx, {
                type: 'line',
                data: { labels: [], datasets: [
                    { label: 'Total', data: [], borderColor: '#2979ff', backgroundColor: 'rgba(41,121,255,0.1)', fill: true, tension: 0.3, pointRadius: 2 },
                    { label: 'Cash', data: [], borderColor: '#ffd600', backgroundColor: 'transparent', borderDash: [4,3], tension: 0.3, pointRadius: 0 },
                ] },
                options: { ...chartDefaults, plugins: { ...chartDefaults.plugins, legend: { ...chartDefaults.plugins.legend, display: true } } },
            });

            const pnlCtx = document.getElementById('chart-pnl').getContext('2d');
            pnlChart = new Chart(pnlCtx, {
                type: 'line',
                data: { labels: [], datasets: [{
                    label: 'P&L %',
                    data: [],
                    borderColor: '#00c853',
                    backgroundColor: 'rgba(0,200,83,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2,
                    segment: {
                        borderColor: ctx => ctx.p1.parsed.y < 0 ? '#ff1744' : '#00c853',
                        backgroundColor: ctx => ctx.p1.parsed.y < 0 ? 'rgba(255,23,68,0.1)' : 'rgba(0,200,83,0.1)',
                    },
                }] },
                options: { ...chartDefaults, plugins: { ...chartDefaults.plugins, legend: { display: false } } },
            });

            const allocCtx = document.getElementById('chart-alloc').getContext('2d');
            allocChart = new Chart(allocCtx, {
                type: 'doughnut',
                data: { labels: ['Cash'], datasets: [{ data: [1], backgroundColor: ['#2979ff'], borderColor: '#1a1d27', borderWidth: 2 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: '#8b8fa3', font: { size: 11 }, padding: 12 } } },
                },
            });
        }

        function fmtTime(ts) {
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        async function loadCharts() {
            try {
                const resp = await fetch('/api/snapshots');
                const snaps = await resp.json();
                if (!snaps.length) return;

                const labels = snaps.map(s => fmtTime(s.timestamp));
                const totals = snaps.map(s => s.total_value);
                const cash = snaps.map(s => s.cash);
                const pnlPct = snaps.map(s => s.pnl_pct);

                valueChart.data.labels = labels;
                valueChart.data.datasets[0].data = totals;
                valueChart.data.datasets[1].data = cash;
                valueChart.update();

                pnlChart.data.labels = labels;
                pnlChart.data.datasets[0].data = pnlPct;
                pnlChart.update();
            } catch (err) {
                console.error('Failed to load chart data:', err);
            }
        }

        function updateAllocChart(data) {
            if (!allocChart) return;
            const labels = ['Cash'];
            const values = [data.cash];
            const colours = ['#2979ff'];
            const palette = ['#00c853','#ff1744','#ffd600','#ab47bc','#26a69a','#ff7043','#42a5f5','#ec407a'];
            if (data.holdings) {
                data.holdings.forEach((h, i) => {
                    labels.push(h.ticker);
                    values.push(h.market_value);
                    colours.push(palette[i % palette.length]);
                });
            }
            allocChart.data.labels = labels;
            allocChart.data.datasets[0].data = values;
            allocChart.data.datasets[0].backgroundColor = colours;
            allocChart.update();
        }

        async function loadStatus() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                if (data.error) { console.error(data.error); return; }

                document.getElementById('total-value').textContent = fmt(data.total_value);
                document.getElementById('cash-value').textContent = fmt(data.cash);
                document.getElementById('holdings-value').textContent = fmt(data.holdings_value);
                document.getElementById('positions-count').textContent = data.num_positions;

                const pnlEl = document.getElementById('pnl-value');
                pnlEl.textContent = (data.total_pnl >= 0 ? '+' : '') + fmt(data.total_pnl);
                pnlEl.className = 'card-value ' + (data.total_pnl >= 0 ? 'positive' : 'negative');

                const pctEl = document.getElementById('pnl-pct-value');
                pctEl.textContent = fmtPct(data.total_pnl_pct);
                pctEl.className = 'card-value ' + (data.total_pnl_pct >= 0 ? 'positive' : 'negative');

                const modeBadge = document.getElementById('mode-badge');
                modeBadge.textContent = data.mode.toUpperCase();
                modeBadge.className = 'status-badge ' + (data.mode === 'live' ? 'running' : 'paper');

                const botBadge = document.getElementById('bot-badge');
                const btnStart = document.getElementById('btn-start');
                const btnStop = document.getElementById('btn-stop');
                if (data.bot_running) {
                    botBadge.textContent = 'RUNNING';
                    botBadge.className = 'status-badge running';
                    btnStart.style.display = 'none';
                    btnStop.style.display = '';
                } else {
                    botBadge.textContent = 'STOPPED';
                    botBadge.className = 'status-badge stopped';
                    btnStart.style.display = '';
                    btnStop.style.display = 'none';
                }

                if (data.holdings && data.holdings.length > 0) {
                    let html = '<table><thead><tr><th>Ticker</th><th>Shares</th><th>Avg Cost</th><th>Price</th><th>Value</th><th>P&L</th></tr></thead><tbody>';
                    data.holdings.forEach(h => {
                        const cls = h.pnl >= 0 ? 'positive' : 'negative';
                        html += `<tr>
                            <td><strong>${h.ticker}</strong></td>
                            <td>${h.shares.toFixed(4)}</td>
                            <td>${fmt(h.avg_cost)}</td>
                            <td>${fmt(h.current_price)}</td>
                            <td>${fmt(h.market_value)}</td>
                            <td class="${cls}">${(h.pnl >= 0 ? '+' : '') + fmt(h.pnl)} (${fmtPct(h.pnl_pct)})</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('holdings-table').innerHTML = html;
                } else {
                    document.getElementById('holdings-table').innerHTML = '<div class="loading">No holdings yet</div>';
                }

                document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();

                // Update allocation chart
                updateAllocChart(data);
            } catch (err) {
                console.error('Failed to load status:', err);
            }
        }

        // Initial load
        initCharts();
        refreshAll();
        loadCharts();

        // Auto-refresh
        setInterval(() => { refreshAll(); loadCharts(); }, REFRESH_MS);
    </script>
</body>
</html>
